<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무르익다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --black: #000000;
    --overlay-dark: rgba(0,0,0,0.38);
    --overlay-nav: rgba(0,0,0,0.55);
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.18);
    --glass-menu: rgba(15,15,15,0.82);
    --accent: #c8d8b0;
    --accent2: #8fada0;
    --text-primary: #ffffff;
    --text-muted: rgba(255,255,255,0.65);
    --font-sans: 'Noto Sans KR', sans-serif;
    --font-serif: 'Noto Serif KR', serif;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: var(--font-sans);
    background: #1a1a1a;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  /* ── 배경 ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&q=80') center/cover no-repeat;
    transform: scale(1.05);
    animation: bgBreath 20s ease-in-out infinite alternate;
  }
  @keyframes bgBreath {
    from { transform: scale(1.05); }
    to   { transform: scale(1.12); }
  }
  .bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.5) 0%,
      rgba(0,0,0,0.2) 40%,
      rgba(0,0,0,0.25) 70%,
      rgba(0,0,0,0.65) 100%
    );
  }

  /* ── 상단 NAV ── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--overlay-nav);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 0.5px solid var(--glass-border);
  }

  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    text-decoration: none;
  }
  .nav-logo-icon {
    width: 32px; height: 32px;
    border: 1.5px solid var(--glass-border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: var(--glass);
    flex-shrink: 0;
  }
  .nav-logo-icon svg {
    width: 18px; height: 18px; opacity: 0.9;
  }
  .nav-logo-text {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 400;
    color: var(--white);
    letter-spacing: 0.04em;
    line-height: 1.1;
  }
  .nav-logo-text small {
    display: block;
    font-family: var(--font-sans);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-weight: 300;
  }

  .nav-right {
    display: flex; align-items: center; gap: 12px;
  }

  .nav-user {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 20px;
    transition: background 0.2s;
  }
  .nav-user:hover { background: var(--glass); }
  .nav-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--accent2);
    border: 1.5px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; color: #fff;
  }
  .nav-username {
    font-size: 13px; color: var(--text-muted);
    display: none;
  }
  @media (min-width: 600px) { .nav-username { display: block; } }

  .nav-time {
    font-size: 13px; color: var(--text-muted);
    letter-spacing: 0.06em;
    font-weight: 300;
    line-height: 1.3;
    text-align: right;
    display: none;
  }
  @media (min-width: 480px) { .nav-time { display: block; } }
  .nav-time .time-main { font-size: 15px; color: var(--white); font-weight: 400; }

  .menu-btn {
    width: 36px; height: 36px;
    background: var(--glass);
    border: 0.5px solid var(--glass-border);
    border-radius: 8px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .menu-btn:hover { background: rgba(255,255,255,0.15); }
  .menu-btn span {
    display: block; width: 18px; height: 1.5px;
    background: var(--white);
    border-radius: 2px;
    transition: all 0.3s ease;
  }
  .menu-open .menu-btn span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .menu-open .menu-btn span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .menu-open .menu-btn span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  /* ── 메뉴 패널 ── */
  .menu-panel {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 200;
    width: min(280px, 80vw);
    background: var(--glass-menu);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-left: 0.5px solid var(--glass-border);
    transform: translateX(100%);
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; flex-direction: column;
    padding: 80px 0 40px;
  }
  .menu-panel.open { transform: translateX(0); }

  .menu-panel-logo {
    padding: 0 32px 32px;
    border-bottom: 0.5px solid var(--glass-border);
    margin-bottom: 8px;
  }
  .menu-panel-logo .logo-ko {
    font-family: var(--font-serif);
    font-size: 22px; font-weight: 400;
    color: var(--white);
    letter-spacing: 0.06em;
  }
  .menu-panel-logo .logo-sub {
    font-size: 11px; color: var(--text-muted);
    margin-top: 4px; letter-spacing: 0.08em;
  }

  .menu-nav { list-style: none; padding: 0; flex: 1; }
  .menu-nav li a {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 32px;
    font-size: 15px; font-weight: 400;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    border-left: 2px solid transparent;
  }
  .menu-nav li a:hover {
    color: var(--white);
    background: var(--glass);
    border-left-color: var(--accent);
  }
  .menu-nav li a .menu-icon {
    width: 20px; height: 20px;
    opacity: 0.6;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .menu-nav li a:hover .menu-icon { opacity: 1; }
  .menu-nav li.active a {
    color: var(--white);
    border-left-color: var(--accent);
  }

  .menu-footer {
    padding: 20px 32px 0;
    border-top: 0.5px solid var(--glass-border);
  }
  .menu-footer-btn {
    display: block; width: 100%;
    padding: 10px;
    background: var(--glass);
    border: 0.5px solid var(--glass-border);
    border-radius: 8px;
    color: var(--white);
    font-size: 13px; font-family: var(--font-sans);
    cursor: pointer; text-align: center;
    transition: background 0.2s;
  }
  .menu-footer-btn:hover { background: rgba(255,255,255,0.14); }

  .menu-overlay {
    position: fixed; inset: 0; z-index: 190;
    background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .menu-overlay.open { opacity: 1; pointer-events: all; }

  /* ── 메인 콘텐츠 ── */
  .main {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    pointer-events: none;
  }

  .hero-tagline {
    font-size: clamp(11px, 2vw, 13px);
    color: var(--accent);
    letter-spacing: 0.25em;
    font-weight: 400;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
  }

  .hero-clock {
    font-family: var(--font-sans);
    font-size: clamp(72px, 18vw, 160px);
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--white);
    line-height: 1;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.5s forwards;
    user-select: none;
  }

  .hero-date {
    font-size: clamp(13px, 2.5vw, 16px);
    color: var(--text-muted);
    letter-spacing: 0.12em;
    font-weight: 300;
    margin-top: 12px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.7s forwards;
  }

  .hero-divider {
    width: 1px; height: 48px;
    background: linear-gradient(to bottom, transparent, var(--glass-border), transparent);
    margin: 32px auto;
    opacity: 0;
    animation: fadeIn 0.8s ease 1s forwards;
  }

  .hero-cta {
    display: flex; gap: 12px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.1s forwards;
    pointer-events: all;
    flex-wrap: wrap; justify-content: center;
  }

  .btn-primary {
    padding: 12px 28px;
    background: var(--white);
    color: var(--black);
    border: none;
    border-radius: 6px;
    font-family: var(--font-sans);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
  }
  .btn-primary:hover {
    background: var(--accent);
    transform: translateY(-1px);
  }
  .btn-secondary {
    padding: 12px 28px;
    background: var(--glass);
    color: var(--white);
    border: 0.5px solid var(--glass-border);
    border-radius: 6px;
    font-family: var(--font-sans);
    font-size: 14px; font-weight: 400;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.16);
    transform: translateY(-1px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── 스크롤 다운 화살표 ── */
  .scroll-hint {
    position: fixed; bottom: 100px; left: 50%; z-index: 20;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    opacity: 0;
    animation: fadeIn 0.8s ease 1.6s forwards;
  }
  .scroll-hint span {
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .scroll-arrow {
    width: 28px; height: 28px;
    border-left: 1.5px solid rgba(255,255,255,0.4);
    border-bottom: 1.5px solid rgba(255,255,255,0.4);
    transform: rotate(-45deg);
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: rotate(-45deg) translateY(0); opacity: 0.5; }
    50%       { transform: rotate(-45deg) translateY(6px); opacity: 1; }
  }

  /* ── 하단 뮤직 플레이어 ── */
  .player {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--overlay-nav);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 0.5px solid var(--glass-border);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 14px;
    height: 64px;
  }

  .player-thumb {
    width: 40px; height: 40px; border-radius: 6px;
    background: linear-gradient(135deg, #3a5a4a, #6a8a6a);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .player-info { flex: 1; min-width: 0; }
  .player-title {
    font-size: 13px; font-weight: 500;
    color: var(--white);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .player-artist { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .player-controls {
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }
  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
    border-radius: 4px;
  }
  .ctrl-btn:hover { color: var(--white); }
  .ctrl-btn.play {
    width: 36px; height: 36px;
    background: var(--white);
    border-radius: 50%;
    color: var(--black);
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn.play:hover { background: var(--accent); }
  .ctrl-btn svg { width: 16px; height: 16px; }

  .player-progress {
    display: flex; align-items: center; gap: 8px;
    flex: 1; max-width: 220px;
  }
  .player-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .progress-bar {
    flex: 1; height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 35%;
    background: var(--white);
    border-radius: 2px;
    transition: width 0.1s;
  }

  .player-extra {
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .vol-icon { color: var(--text-muted); }
  .vol-bar {
    width: 60px; height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }
  .vol-fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 65%;
    background: rgba(255,255,255,0.6);
    border-radius: 2px;
  }

  /* 모바일: 일부 요소 숨김 */
  @media (max-width: 480px) {
    .player-progress, .player-extra { display: none; }
  }
  @media (max-width: 360px) {
    .player-info { display: none; }
  }
</style>
</head>

<script>
  // 시계
  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    const timeStr = `${hh}:${mm}`;
    document.getElementById('mainClock').textContent = timeStr;
    document.getElementById('clockSmall').textContent = timeStr;

    const days = ['일','월','화','수','목','금','토'];
    const y = now.getFullYear(), mo = now.getMonth()+1, d = now.getDate();
    const day = days[now.getDay()];
    document.getElementById('mainDate').textContent = `${y}년 ${mo}월 ${d}일 ${day}요일`;
    document.getElementById('dateSmall').textContent = `${y}. ${String(mo).padStart(2,'0')}. ${String(d).padStart(2,'0')} (${day})`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // 메뉴
  let menuOpen = false;
  function toggleMenu() {
    menuOpen = !menuOpen;
    document.getElementById('menuPanel').classList.toggle('open', menuOpen);
    document.getElementById('menuOverlay').classList.toggle('open', menuOpen);
    document.getElementById('nav').classList.toggle('menu-open', menuOpen);
    document.body.style.overflow = menuOpen ? 'hidden' : '';
  }

  // 플레이어 토글
  let playing = false;
  let elapsed = 134; // 2:14
  const total = 363;  // 6:03
  let timer = null;

  function togglePlay() {
    playing = !playing;
    const icon = document.getElementById('playIcon');
    if (playing) {
      icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      timer = setInterval(tickPlayer, 1000);
    } else {
      icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      clearInterval(timer);
    }
  }

  function tickPlayer() {
    elapsed = (elapsed + 1) % total;
    const m = Math.floor(elapsed / 60);
    const s = String(elapsed % 60).padStart(2,'0');
    document.getElementById('playerTime').textContent = `${m}:${s}`;
    document.getElementById('progressFill').style.width = Math.round((elapsed / total) * 100) + '%';
  }

  function seekAudio(e, bar) {
    const rect = bar.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    elapsed = Math.floor(ratio * total);
    const m = Math.floor(elapsed / 60);
    const s = String(elapsed % 60).padStart(2,'0');
    document.getElementById('playerTime').textContent = `${m}:${s}`;
    document.getElementById('progressFill').style.width = Math.round(ratio * 100) + '%';
  }
</script>
</body>
</html>
